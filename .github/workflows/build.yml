name: Build and Release Plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'context-for-IA'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'

jobs:
  build_linux:
    name: Build Linux VST3
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libcurl4-openssl-dev libfreetype6-dev libfontconfig1-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libwebkit2gtk-4.1-dev libgtk-3-dev
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: cmake --build build --config Release --target AdaptiveIR_VST3
    - name: Prepare Artifact
      run: |
        mkdir -p artifacts
        find build -name "*.vst3" -exec cp -r {} artifacts/ \;
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AdaptiveIR_Linux_VST3
        path: artifacts/

  build_windows:
    name: Build Windows VST3
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: cmake --build build --config Release --target AdaptiveIR_VST3
    - name: Prepare Artifact
      shell: bash
      run: |
        mkdir -p artifacts
        find build -name "*.vst3" -exec cp -rv {} artifacts/ \;
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AdaptiveIR_Windows_VST3
        path: artifacts/

  create_release:
    name: Create/Update Release
    needs: [build_linux, build_windows]
    if: always() && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: AdaptiveIR_Linux_VST3
        path: ./release/linux

    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: AdaptiveIR_Windows_VST3
        path: ./release/windows

    - name: Zip Artifacts
      run: |
        mkdir -p final_assets
        if [ -d "release/linux" ]; then
          cd release/linux && zip -r ../../final_assets/AdaptiveIR_Linux.zip . && cd ../..
        fi
        if [ -d "release/windows" ]; then
          cd release/windows && zip -r ../../final_assets/AdaptiveIR_Windows.zip . && cd ../..
        fi

    - name: Continuous Release (Main Branch)
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest-dev
        name: Latest Development Build
        body: |
          Build automatica dell'ultimo commit su `main`.
          Attenzione: questa versione potrebbe essere instabile.
        files: final_assets/*
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Tagged Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: final_assets/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
