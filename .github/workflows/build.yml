name: Build Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_linux:
    name: Build Linux VST3
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libcurl4-openssl-dev libfreetype6-dev libfontconfig1-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libwebkit2gtk-4.1-dev libgtk-3-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --target AdaptiveIR_VST3

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AdaptiveIR_Linux_VST3
        path: build/AdaptiveIR_artefacts/VST3/

  build_windows:
    name: Build Windows VST3
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --target AdaptiveIR_VST3

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AdaptiveIR_Windows_VST3
        path: build/AdaptiveIR_artefacts/Release/VST3/
